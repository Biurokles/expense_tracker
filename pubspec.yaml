name: expense_tracker
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter_riverpod: ^2.0.0
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  uuid: ^4.5.3
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  flutter_colorpicker: ^1.1.0
  fl_chart: ^1.2.0
